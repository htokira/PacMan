name: Pacman CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Flake8 and generate HTML report
        run: |
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --format=html --htmldir=flake8_report --exit-zero

      - name: Run Tests and generate HTML report
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          python -m pytest --cov=. --html=pytest_report.html --self-contained-html

      - name: Upload Pytest HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: pytest_report.html

      - name: Upload Flake8 HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flake8-html-report
          path: flake8_report/